  <!-- Bulletproof Global Error Catch & Diagnostic Cabin (Z-Index 99999) -->
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      try {
        const errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.width = '100%';
        errDiv.style.backgroundColor = 'rgba(220, 38, 38, 0.95)';
        errDiv.style.color = '#ffffff';
        errDiv.style.padding = '24px';
        errDiv.style.zIndex = '999999';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.fontSize = '12px';
        errDiv.style.lineHeight = '1.6';
        errDiv.style.whiteSpace = 'pre-wrap';
        errDiv.style.overflow = 'auto';
        errDiv.style.maxHeight = '70%';
        errDiv.style.boxShadow = '0 10px 25px rgba(0,0,0,0.5)';
        errDiv.style.borderBottom = '4px solid #7f1d1d';
        
        errDiv.innerHTML = '[GLOBAL ERROR CATCHER - RUNTIME ERROR DETECTED]<br/><br/>' + 
                           '<b>Error Message:</b> ' + message + '<br/>' +
                           '<b>Source File:</b> ' + source + '<br/>' +
                           '<b>Line/Col:</b> ' + lineno + ' : ' + colno + '<br/><br/>' +
                           '<b>Stack Trace:</b><br/>' + (error ? error.stack : 'N/A') + '<br/><br/>' +
                           '<span style="color:#fecaca;">💡 Tips: Please capture this red panel screenshot and send it to your AI Pair Programmer to fix it hot!</span>';
        
        if (document.body) {
          document.body.appendChild(errDiv);
        } else {
          window.onload = function() { document.body.appendChild(errDiv); };
        }
      } catch (e) {
        console.error("Error catcher failed:", e);
      }
      return false;
    };
  </script>

me:"01:25"},{speaker:"醫師專家 Guest (You)",text:"完全正確。在幾何相平面中，當我們令微分方程系統 dx/dt = 0 時，會找到很多固定點（Fixed Points）。如果特徵值實部為負，狀態就會被吸進去，形成吸引子。大腦就是靠吸引子來存儲工作記憶的——比如眼球注視某個方向，背後的微分方程就是一個穩定的「線吸引子（Line Attractor）」，受到微小噪聲擾動也能快速拉回，這使得記憶可以持續存在而不失真。",time:"02:05"},{speaker:"主持人 Host (AI)",text:"這真的把數學跟臨床生理學完美結合了！那我們知道 David Sussillo 最廣為人知的成就是穩定了混亂突觸網路的『FORCE 演算法』。這在運動規劃上扮演什麽角色呢？",time:"02:45"},{speaker:"醫師專家 Guest (You)",text:"這非常有意思。當神經網路的反饋增益 g 大於 1.5 時，網路微分方程會進入高度混沌狀態，流速無法控制。Sussillo 提出的 FORCE 算法利用遞迴最小平方（RLS），在不改變內部突觸連接的情況下，僅僅快速校準輸出 Readout 突觸，就能把混沌在幾毫秒內穩定下來，變成優美的正弦波或複雜時間軌跡。大腦的小腦與運動皮質就是用這套機制，快速在混亂的電生理背景中，規畫出極高靈活度的精細外科手術或提琴彈奏手勢。",time:"03:30"},{speaker:"主持人 Host (AI)",text:"最後，關於多工運算（Multitask），Sussillo 提出的「動力學基元 (Dynamical Motifs)」又是如何讓同一個網路能同時執行多個臨床或認知功能呢？",time:"04:15"},{speaker:"醫師專家 Guest (You)",text:"傳統上大家覺得，如果網路學了新東西，舊的東西就會被覆蓋，這叫災難性遺忘。但 Sussillo 展示了，RNN 可以把不同的任務動力學，放在不同的低維正交子空間（Orthogonal Subspaces）中。就像在同一個網絡裡放了多套正交的向量場。當大腦切換外部輸入信號時，微分方程的相平面會發生微小的平移，調用不同的「動力學基元」去計算，完美實現了認知多工，這對我們理解大腦前額葉的多工決策機制有著決定性的臨床啟示！",time:"04:55"}],b={neuron2009:[{speaker:"主持人 Host (AI)",text:"歡迎收聽『智慧播客合成電台』！今天我們的主題聚焦於 David Sussillo 教授於 2009 年發表在 Neuron 的奠基論文——FORCE 混沌循環網路穩定化學習。Dr.，這套著名的 RLS 線上更新突觸 Readout 演算法，在我們理解大腦運算上扮演了什麼角色？",time:"00:00"},{speaker:"醫師專家 Guest (You)",text:"主持人好，各位聽眾好。這篇 2009 年的論文簡集是計算神經科學的里程碑。以往大家都把混沌（g > 1.5）看作是一種破壞系統的干擾；但 Sussillo 卻巧妙地利用混沌網路豐富的隨機頻率作為基底，透過反饋迴路，在不改變內部突觸的情況下，僅線上微調 Readout 突觸，就能在幾毫秒內把紊亂流速降伏為精美的特定目標軌跡！大腦的小腦與前運動皮質就是用這套 FORCE 遞迴更新機制，在嘈雜的生理背景下規劃出極為精細的外科手術手勢。",time:"00:45"},{speaker:"主持人 Host (AI)",text:"原來如此！利用隨機混沌作為天然素材，只需線上快速約束 Readout 就能生成精細規劃！這就是 First-Order 控制的數學魅力。這對於臨床上有什麼深刻啟示呢？",time:"01:40"},{speaker:"醫師專家 Guest (You)",text:"臨床上，這揭示了為什麼單個神經元的活動看起來雜亂無章，但我們的肌肉運動卻極其精確。因為大腦操作的是整個群體動力學流形。FORCE 穩定機制使我們能夠以極具彈性的方式，在不破壞大腦原本突觸架構的前提下，快速學習新的運動技能，這是大腦高度可塑性與運算效率的完美體現！",time:"02:20"}],slowmanifold2013:[{speaker:"主持人 Host (AI)",text:"歡迎來到播客合成空間！今天我們要探討的是 2013 年 Sussillo & Barak 發表的『慢速流形 (Slow Manifolds)』與固定點 Jacobian 特徵值分析。這項研究是如何幫助我們打開 RNN 這顆幾何黑盒子的？",time:"00:00"},{speaker:"醫師專家 Guest (You)",text:"主持人好。2013 年 of 這篇論文成功用拓樸動力系統學解構了 RNN 的多工運算本質。當我們訓練好一個網絡，我們不能只看個別突觸，必須去尋找系統流速 dx/dt ≈ 0 的慢速流形（Slow Manifold）。藉由 L-BFGS 優化，我們發現網路並非靠單一固定點運作，而是利用一條連續的、高度正交的 PC 低維慢速流形來儲存 and 處理多種任務。當收到外部 Go 信號時，系統會跨越 weakly-unstable 的 saddle points 決策邊界進行決策分岔，這將高維微分方程的解析提升到了純粹的幾何美學層面！",time:"00:50"},{speaker:"主持人 Host (AI)",text:"太不可思議了！高維非線性系統的複雜行為，竟然能被簡化為 PC1, PC2, PC3 子空間中的『不穩定螺旋與鞍點分流幾何』！這對於我們探討大腦前額葉的多工決策有何臨床意義？",time:"01:50"},{speaker:"醫師專家 Guest (You)",text:"這給了我們解釋人類多工認知機制的鑰匙。當大腦在前額葉進行複雜決策時，不同任務的動力學軌跡被完美放置在互相正交的低維子空間中。工程師們就像同一個突觸網絡中畫了多套正交的向量場。當大腦切換外部輸入信號時，微分方程的相平面發生微小平移，調用平行正交的幾何基元去運算，這徹底防止了任務間的災難性遺忘，為多工認知和持續學習提供了終極 of 幾何學解釋！",time:"02:35"}],bmi_clinical:[{speaker:"主持人 Host (AI)",text:"歡迎收聽『醫學前沿播客』！今天我們聚焦於 David Sussillo 的群體動力學如何應用於前沿的臨床腦機介面 (BMI) 與肢體控制。這對於神經科醫師而言有著怎樣 Hook 的變革性影響？",time:"00:00"},{speaker:"醫師專家 Guest (You)",text:"主持人好。在傳統腦機介面中，我們常試圖把個別神經元的激發頻率與單個手指肌肉一一對應，但這往往極不穩定且雜訊極大。Sussillo 的流形解碼理論帶來了範式轉移：我們應該直接記錄大批神經元並投射到低維主成分空間，解碼整個『群體軌跡幾何學（Manifold Decoders）』！這能提供極為穩定、抗噪聲的意念控制信號。在臨床上，這讓我們能以無比流暢的方式，引導患者利用額葉的運動流形，精準操縱高難度的多自由度外科義肢，為運動皮質功能的臨床重建提供了堅實的微分幾何基礎！",time:"00:50"},{speaker:"主持人 Host (AI)",text:"防護及安全意念控制，這簡直是科幻小說走進現實！所以大腦不需要修改個別突觸，而是操作群體動力學流形！這對未來癱瘓或中風患者的康復解鎖了什麼樣的前景？",time:"01:45"},{speaker:"醫師專家 Guest (You)",text:"前景無限。這意味著中風康復並非是要修復死去的單個神經元，而是要引導存活的神經元群體重新融合、投影出一個平滑且功能正交的低維運動流形。基於群體幾何解碼的閉環電刺激，可以大幅加速神經網絡的重新適應與學習。這項大腦幾何動力學的學術成果，正在為未來神經康復與外骨骼臨床操縱鋪平最完美的科學道路！",time:"02:30"}]},[_,$]=P.useState(M),D=(L,F)=>{try{if(!x.current||!F)return;x.current.cancel();const k=_[L],E=new SpeechSynthesisUtterance(k.text);E.lang="zh-TW",E.volume=1;const T=x.current.getVoices(),W=T.find(re=>re.lang==="zh-TW"||re.lang==="zh_TW")||T.find(re=>re.lang.toLowerCase().includes("zh"))||T.find(re=>re.lang.toLowerCase().includes("cmn"));W&&(E.voice=W);const B=k.speaker.includes("Host");E.pitch=B?1.15:.85,E.rate=n*(B?1.05:.95),E.onstart=()=>{a(L),i(L*100/_.length)},E.onend=()=>{const re=L+1;re<_.length&&e?D(re,!0):re>=_.length&&(t(!1),i(100))},C.current=E,x.current.speak(E)}catch(k){con
